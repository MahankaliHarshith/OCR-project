version: "3.8"

services:
  receipt-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-scanner
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OTEL_TRACING_ENABLED=${OTEL_TRACING_ENABLED:-true}
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=receipt-scanner
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      # Persist uploaded images, exports, and database across restarts
      - scanner-uploads:/app/uploads
      - scanner-exports:/app/exports
      - scanner-logs:/app/logs
      - scanner-data:/app/data
      - scanner-backups:/app/backups
      # Persist EasyOCR models (avoids ~500MB re-download)
      - scanner-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ─── Jaeger — Distributed Tracing UI ──────────────────
  # Collects OpenTelemetry spans and provides a rich query UI
  # Dashboard: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ─── Prometheus — Metrics Collection ──────────────────
  # Scrapes /metrics from receipt-scanner every 15s
  # Dashboard: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  # ─── Grafana — Observability Dashboards ───────────────
  # Pre-configured with Prometheus + Jaeger datasources
  # and a Receipt Scanner operations dashboard.
  # Dashboard: http://localhost:3000 (admin/admin)
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
      - loki

  # ─── Alertmanager — Prometheus Alert Routing ────────────
  # Receives alerts from Prometheus and routes to webhook/email/Slack
  # Dashboard: http://localhost:9093
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # ─── Loki — Log Aggregation ────────────────────────────
  # Receives structured JSON logs from Promtail
  # API: http://localhost:3100
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ─── Promtail — Log Shipper ────────────────────────────
  # Tails JSON + text logs and pushes to Loki
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - scanner-logs:/var/log/receipt-scanner:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  scanner-uploads:
  scanner-exports:
  scanner-logs:
  scanner-data:
  scanner-backups:
  scanner-models:
  prometheus-data:
  grafana-data:
  loki-data:
