version: "3.8"

services:
  receipt-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: receipt-scanner
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OTEL_TRACING_ENABLED=${OTEL_TRACING_ENABLED:-true}
      - OTEL_EXPORTER_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=receipt-scanner
    depends_on:
      jaeger:
        condition: service_started
    volumes:
      # Persist uploaded images, exports, and database across restarts
      - scanner-uploads:/app/uploads
      - scanner-exports:/app/exports
      - scanner-logs:/app/logs
      - scanner-data:/app/data
      - scanner-backups:/app/backups
      # Persist EasyOCR models (avoids ~500MB re-download)
      - scanner-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ─── Jaeger — Distributed Tracing UI ──────────────────
  # Collects OpenTelemetry spans and provides a rich query UI
  # Dashboard: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ─── Prometheus — Metrics Collection ──────────────────
  # Scrapes /metrics from receipt-scanner every 15s
  # Dashboard: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ─── Grafana — Observability Dashboards ───────────────
  # Pre-configured with Prometheus + Jaeger datasources
  # and a Receipt Scanner operations dashboard.
  # Dashboard: http://localhost:3000 (admin/admin)
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

volumes:
  scanner-uploads:
  scanner-exports:
  scanner-logs:
  scanner-data:
  scanner-backups:
  scanner-models:
  prometheus-data:
  grafana-data:
