# ─────────────────────────────────────────────────────────────
# Promtail — Log Shipper for Grafana Loki
# ─────────────────────────────────────────────────────────────
# Tails the JSON log file from receipt-scanner and pushes
# structured entries to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Receipt Scanner JSON logs ────────────────────────────
  - job_name: receipt-scanner-json
    static_configs:
      - targets:
          - localhost
        labels:
          job: receipt-scanner
          environment: production
          __path__: /var/log/receipt-scanner/*.json.log

    pipeline_stages:
      # Parse the JSON log line
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            module: module
            function: function
            line: line
            timestamp: timestamp

      # Use the timestamp from the log entry (not scrape time)
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999999Z07:00"

      # Map level → Loki label
      - labels:
          level:
          logger:
          module:

      # Set the log line to the message field
      - output:
          source: message

  # ── Receipt Scanner plain text logs (fallback) ──────────
  - job_name: receipt-scanner-text
    static_configs:
      - targets:
          - localhost
        labels:
          job: receipt-scanner
          format: text
          __path__: /var/log/receipt-scanner/app.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \| (?P<level>\w+)\s+\|'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05"
